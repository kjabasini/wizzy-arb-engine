<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wizzy Arb Engine v6</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--font:'DM Mono','Courier New',monospace;--fontD:'Outfit','Segoe UI',sans-serif;--radius:16px;--blur:20px;--tr:0.5s cubic-bezier(.4,0,.2,1)}
  [data-theme="dark"]{--bg:#050a14;--glass:rgba(14,22,44,.5);--gbr:rgba(255,255,255,.06);--gsh:0 8px 32px rgba(0,0,0,.4);--gin:inset 0 1px 0 rgba(255,255,255,.05);--text:#e4ecf6;--dim:#546580;--dimmer:#283850;--ibg:rgba(255,255,255,.04);--green:#00E676;--blue:#448AFF;--gold:#FFD740;--red:#FF5252;--purple:#B388FF;--orb1:rgba(0,230,118,.10);--orb2:rgba(68,138,255,.08);--orb3:rgba(255,215,64,.05);--bestbg:rgba(0,230,118,.06);--tknob:#FFD740;--pbg:rgba(0,230,118,.04);--pbd:rgba(0,230,118,.12);--sa:rgba(255,255,255,.03);--sb:rgba(255,255,255,.06);--safebg:rgba(0,230,118,.04);--safebd:rgba(0,230,118,.12);--stepbg:rgba(68,138,255,.06);--stepbd:rgba(68,138,255,.15)}
  [data-theme="light"]{--bg:#e6ecf4;--glass:rgba(255,255,255,.50);--gbr:rgba(0,0,0,.06);--gsh:0 8px 32px rgba(0,0,0,.07);--gin:inset 0 1px 0 rgba(255,255,255,.75);--text:#162240;--dim:#6880a0;--dimmer:#b0bed2;--ibg:rgba(0,0,0,.03);--green:#00B853;--blue:#2962FF;--gold:#E68A00;--red:#D40000;--purple:#6200EA;--orb1:rgba(0,184,83,.14);--orb2:rgba(41,98,255,.10);--orb3:rgba(230,138,0,.07);--bestbg:rgba(0,184,83,.08);--tknob:#448AFF;--pbg:rgba(0,184,83,.05);--pbd:rgba(0,184,83,.15);--sa:rgba(255,255,255,.35);--sb:rgba(255,255,255,.55);--safebg:rgba(0,184,83,.04);--safebd:rgba(0,184,83,.12);--stepbg:rgba(41,98,255,.05);--stepbd:rgba(41,98,255,.12)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;transition:background var(--tr),color var(--tr)}
  .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);z-index:0;transition:background var(--tr)}
  .orb-1{width:500px;height:500px;top:-150px;left:-100px;background:var(--orb1);animation:o1 22s ease-in-out infinite}
  .orb-2{width:600px;height:600px;bottom:-200px;right:-150px;background:var(--orb2);animation:o2 28s ease-in-out infinite}
  .orb-3{width:350px;height:350px;top:40%;left:40%;background:var(--orb3);animation:o3 18s ease-in-out infinite}
  @keyframes o1{0%,100%{transform:translate(0,0)}33%{transform:translate(50px,70px)}66%{transform:translate(-40px,30px)}}
  @keyframes o2{0%,100%{transform:translate(0,0)}33%{transform:translate(-60px,-50px)}66%{transform:translate(40px,-70px)}}
  @keyframes o3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.25)}}
  .g{background:var(--glass);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--gbr);box-shadow:var(--gsh),var(--gin);transition:background var(--tr),border-color var(--tr),box-shadow var(--tr);position:relative;overflow:hidden}
  .g .sh{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;border-radius:inherit;background:linear-gradient(105deg,transparent 38%,var(--sa) 44%,var(--sb) 50%,var(--sa) 56%,transparent 62%);background-size:220% 100%;animation:gs 10s ease-in-out infinite}
  .g>*:not(.sh){position:relative;z-index:1}
  @keyframes gs{0%{background-position:-220% 0}100%{background-position:220% 0}}
  @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.15}}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dimmer);border-radius:2px}
  a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

  .header{position:sticky;top:0;z-index:100;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--glass);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--gbr);transition:all var(--tr)}
  .logo-row{display:flex;align-items:center;gap:10px}
  .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--fontD);font-weight:800;font-size:15px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2);box-shadow:0 4px 16px rgba(0,230,118,.2)}
  .logo-text{font-family:var(--fontD);font-weight:700;font-size:16px;transition:color var(--tr)}.logo-text span{color:var(--green)}
  .logo-sub{font-size:9px;color:var(--dim);letter-spacing:.8px}
  .hr{display:flex;align-items:center;gap:12px}
  .scan{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);letter-spacing:.5px}
  .sdot-h{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:p 2s infinite}
  .tog{width:50px;height:28px;border-radius:14px;cursor:pointer;position:relative;flex-shrink:0;background:var(--ibg);border:1px solid var(--gbr);transition:all var(--tr)}
  .tog .knob{width:22px;height:22px;border-radius:50%;position:absolute;top:2px;background:var(--tknob);transition:all var(--tr);box-shadow:0 2px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:12px}
  [data-theme="dark"] .tog .knob{left:2px}[data-theme="dark"] .tog .knob::after{content:"🌙"}
  [data-theme="light"] .tog .knob{left:24px}[data-theme="light"] .tog .knob::after{content:"☀️"}
  .content{padding:14px;max-width:900px;margin:0 auto;position:relative;z-index:1}

  .guide{border-radius:var(--radius);padding:16px;margin-bottom:14px;animation:fu .3s ease both}
  .guide-title{font-family:var(--fontD);font-weight:700;font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .guide-title .cbtn{margin-left:auto;font-size:11px;color:var(--dim);cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--ibg);border:1px solid var(--gbr)}
  .step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
  .step-num{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fontD);font-weight:700;font-size:13px;flex-shrink:0}
  .step-content{flex:1}.step-title{font-family:var(--fontD);font-weight:600;font-size:13px;margin-bottom:4px}
  .step-desc{font-size:11px;color:var(--dim);line-height:1.6}
  .step-desc code{background:var(--ibg);padding:2px 6px;border-radius:4px;font-size:10px;color:var(--green);border:1px solid var(--gbr)}
  .step-link{display:inline-block;margin-top:6px;padding:6px 14px;border-radius:8px;background:var(--blue);color:#fff;font-size:11px;font-weight:600;text-decoration:none;transition:all .2s}
  .credit-info{background:var(--stepbg);border:1px solid var(--stepbd);border-radius:10px;padding:12px;font-size:11px;color:var(--dim);line-height:1.6;margin-top:8px}.credit-info b{color:var(--text)}

  .api-bar{border-radius:var(--radius);padding:14px;margin-bottom:14px}
  .api-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .api-input{flex:1;min-width:180px;padding:10px 14px;border-radius:10px;border:1px solid var(--gbr);background:var(--ibg);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:all .2s}
  .api-input:focus{border-color:var(--green)}.api-input::placeholder{color:var(--dimmer)}
  .api-btn{padding:10px 16px;border-radius:10px;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
  .api-btn.go{background:var(--green);color:#000}.api-btn.demo{background:var(--ibg);color:var(--dim);border:1px solid var(--gbr)}
  .api-btn:active{transform:scale(.95)}
  .api-status{font-size:11px;margin-top:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .api-status.ok{color:var(--green)}.api-status.err{color:var(--red)}.api-status.load{color:var(--gold)}
  .spinner{width:14px;height:14px;border:2px solid var(--dimmer);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
  .credits-bar{font-size:10px;color:var(--dim);margin-top:8px;display:flex;align-items:center;gap:8px}
  .credits-meter{flex:1;max-width:200px;height:6px;background:var(--ibg);border-radius:3px;overflow:hidden}
  .credits-fill{height:100%;border-radius:3px;transition:width .5s}
  .live-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.8px;background:rgba(0,230,118,.15);color:var(--green);margin-left:4px}

  /* Bookmaker status bar */
  .bk-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .bk-chip{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;flex:1;min-width:100px;justify-content:center}
  .bk-chip .bk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .bk-chip .bk-name{font-family:var(--fontD)}
  .bk-chip .bk-role{font-size:8px;opacity:.7;font-weight:400;letter-spacing:.5px}

  .safety-info{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:11px;line-height:1.6;background:var(--safebg);border:1px solid var(--safebd);color:var(--green);animation:fu .4s ease both}.safety-info b{font-weight:700}

  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{border-radius:var(--radius);padding:14px;animation:fu .4s ease both}
  .stat:nth-child(1){animation-delay:0s}.stat:nth-child(2){animation-delay:.06s}.stat:nth-child(3){animation-delay:.12s}.stat:nth-child(4){animation-delay:.18s}
  .stat-l{font-size:9px;color:var(--dim);letter-spacing:1.4px;margin-bottom:5px}
  .stat-v{font-family:var(--fontD);font-size:22px;font-weight:700}
  .stat-s{font-size:9px;color:var(--dimmer);margin-top:3px}
  .b-input{background:transparent;border:none;color:var(--text);font-family:var(--fontD);font-size:22px;font-weight:700;width:100%;outline:none;transition:color var(--tr)}

  .filters{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:6px;-ms-overflow-style:none;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}
  .fbtn{flex-shrink:0;padding:7px 14px;border-radius:10px;font-family:var(--font);font-size:11px;cursor:pointer;border:1px solid var(--gbr);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--dim);transition:all .25s;white-space:nowrap}
  .fbtn.a{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.25);color:var(--green);box-shadow:0 0 20px rgba(0,230,118,.06)}
  .mrow{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:10px;color:var(--dim)}
  .mrow input[type=range]{flex:1;accent-color:var(--green);height:4px}.mval{color:var(--green);font-weight:600;min-width:32px;text-align:right}

  .alist{display:flex;flex-direction:column;gap:10px}
  .acard{border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .25s;animation:fu .35s ease both}
  .acard:active{transform:scale(.985)}
  .acard.sel{border-color:rgba(0,230,118,.3);box-shadow:var(--gsh),0 0 35px rgba(0,230,118,.05);border-radius:var(--radius) var(--radius) 0 0;margin-bottom:0}
  .atop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .arank{font-size:10px;color:var(--dim);background:var(--ibg);width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0}
  .amatch{font-family:var(--fontD);font-weight:600;font-size:14px;line-height:1.3}
  .ameta{font-size:10px;color:var(--dim);margin-top:2px}
  .amargin{font-family:var(--fontD);font-weight:700;font-size:22px;text-align:right;line-height:1}
  .amargin-l{font-size:9px;color:var(--dim);letter-spacing:.8px;text-align:right}
  .abets{display:grid;grid-template-columns:1fr 1fr;gap:8px}.abets.three{grid-template-columns:1fr 1fr 1fr}
  .abet{background:var(--ibg);border-radius:10px;padding:10px;border:1px solid var(--gbr);transition:all var(--tr)}
  .bm{display:inline-block;padding:2px 8px;border-radius:5px;font-size:9px;font-weight:600;color:#fff;letter-spacing:.3px}
  .oname{font-size:10px;color:var(--dim);margin-top:4px}
  .bodds{font-family:var(--fontD);font-size:20px;font-weight:700;margin-top:2px}
  .sig{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
  .sigdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .sigl{font-size:11px;font-weight:600;letter-spacing:.5px}
  .sigr{font-size:10px;color:var(--dim)}
  .tbadge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:9px;font-weight:600;letter-spacing:.5px;margin-left:auto}
  .tbadge.t3{background:rgba(0,230,118,.12);color:var(--green)}
  .tbadge.tou{background:rgba(68,138,255,.12);color:var(--blue)}
  .tbadge.tah{background:rgba(179,136,255,.12);color:var(--purple)}
  .pair-tag{font-size:9px;color:var(--dim);margin-top:4px;font-style:italic}

  .dpanel{padding:16px;border-radius:0 0 var(--radius) var(--radius);border-top:none;animation:fu .3s ease;margin-bottom:10px}
  .dtitle{font-size:10px;color:var(--dim);letter-spacing:1.3px;margin-bottom:10px;font-weight:500}
  .scards{display:grid;gap:8px;margin-bottom:14px}
  .scard{background:var(--ibg);border:1px solid var(--gbr);border-radius:12px;padding:14px;text-align:center;transition:all var(--tr)}
  .slabel{font-size:9px;color:var(--dim);margin-top:8px;letter-spacing:.8px}
  .sval{font-family:var(--fontD);font-size:18px;font-weight:700;margin-top:2px}
  .pbar{border-radius:14px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;margin-bottom:14px;background:var(--pbg);border:1px solid var(--pbd);transition:all var(--tr)}
  .plbl{font-size:9px;color:var(--dim);letter-spacing:1px}
  .pval{font-family:var(--fontD);font-size:16px;font-weight:700;margin-top:3px}
  .explain{font-size:11px;color:var(--dim);line-height:1.6;padding:12px;border-radius:10px;background:var(--ibg);margin-bottom:14px}.explain b{color:var(--text);font-weight:600}
  .otbl{width:100%;border-collapse:collapse;font-size:12px}
  .otbl th{text-align:center;padding:10px 6px;color:var(--dim);font-weight:500;font-size:10px;letter-spacing:.8px;border-bottom:1px solid var(--gbr)}.otbl th:first-child{text-align:left}
  .otbl td{text-align:center;padding:10px 6px;border-bottom:1px solid var(--gbr);transition:all var(--tr);font-weight:500}.otbl td:first-child{text-align:left}
  .otbl td.best{color:var(--green);font-weight:700;background:var(--bestbg);border-radius:4px}
  .footer{margin-top:24px;padding:16px 0;border-top:1px solid var(--gbr);font-size:9px;color:var(--dimmer);text-align:center;line-height:1.7;transition:all var(--tr)}
  .empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:13px;border-radius:var(--radius)}
  @media(min-width:600px){.content{padding:18px 24px}.stats{grid-template-columns:repeat(4,1fr)}.pbar{grid-template-columns:repeat(4,1fr)}}
  @media(min-width:768px){.scards{grid-template-columns:1fr 1fr}.scards.tw{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="header">
  <div class="logo-row">
    <div class="logo-icon">W</div>
    <div><div class="logo-text">Wizzy <span>Arb Engine</span></div><div class="logo-sub">3-BOOK • ALL SPORTS</div></div>
  </div>
  <div class="hr">
    <div class="scan"><div class="sdot-h"></div> <span id="scanText">READY</span></div>
    <div class="tog" id="tog"><div class="knob"></div></div>
  </div>
</div>
<div class="content" id="app"></div>

<script>
// ═══════════ CONFIG: YOUR 3 BOOKMAKERS ONLY ═══════════
const MY_BOOKS = ['pinnacle','marathon_bet','1xbet'];
const BOOK_INFO = {
  pinnacle: {name:'Pinnacle',color:'#CC2131',role:'SHARP'},
  marathon_bet: {name:'Marathon',color:'#6236FF',role:'SOFT'},
  '1xbet': {name:'1XBet',color:'#1B8EDE',role:'SOFT'}
};
const API_BASE='https://api.the-odds-api.com/v4';
const SPORTS=[
  // Football
  {key:'soccer_epl',name:'EPL'},{key:'soccer_spain_la_liga',name:'La Liga'},
  {key:'soccer_italy_serie_a',name:'Serie A'},{key:'soccer_germany_bundesliga',name:'Bundesliga'},
  {key:'soccer_france_ligue_one',name:'Ligue 1'},{key:'soccer_uefa_champs_league',name:'Champions League'},
  {key:'soccer_uefa_europa_league',name:'Europa League'},
  // Basketball
  {key:'basketball_nba',name:'NBA'},{key:'basketball_euroleague',name:'Euroleague'},
  // Tennis
  {key:'tennis_atp_french_open',name:'ATP Tennis'},{key:'tennis_wta_french_open',name:'WTA Tennis'},
  // Hockey
  {key:'icehockey_nhl',name:'NHL'},
  // Baseball
  {key:'baseball_mlb',name:'MLB'},
  // MMA
  {key:'mma_mixed_martial_arts',name:'MMA/UFC'},
  // Cricket
  {key:'cricket_ipl',name:'Cricket IPL'},
  // Rugby
  {key:'rugbyleague_nrl',name:'Rugby NRL'},
  // Upcoming catch-all
  {key:'upcoming',name:'Next 8 (All Sports)'}
];

let S={apiKey:localStorage.getItem('wizzy_key')||'',bankroll:parseInt(localStorage.getItem('wizzy_bankroll'))||1000,league:'All',mktType:'all',minMargin:0,sel:null,matches:[],loading:false,status:'',statusType:'',creditsUsed:0,creditsRemaining:500,isLive:false,guideOpen:false,progress:''};
document.getElementById('tog').onclick=()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark'};

// ═══════════ API: FETCH ONLY 3 BOOKMAKERS ═══════════
async function fetchOdds(apiKey){
  S.loading=true;S.matches=[];S.progress='Starting scan...';render();
  let allM=[];
  // Using bookmakers param = only 1 region cost (≤10 books = 1 region)
  const booksParam=MY_BOOKS.join(',');

  async function safeFetch(url){
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(timer);return r;}
    catch(e){clearTimeout(timer);return null;}
  }

  for(let si=0;si<SPORTS.length;si++){
    const sport=SPORTS[si];
    S.progress=`Scanning ${sport.name}... (${si+1}/${SPORTS.length})`;render();
    try{
      // Fetch h2h and totals IN PARALLEL (faster)
      const [r1,r2]=await Promise.all([
        safeFetch(`${API_BASE}/sports/${sport.key}/odds?regions=eu,uk&oddsFormat=decimal&markets=h2h&apiKey=${apiKey}`),
        safeFetch(`${API_BASE}/sports/${sport.key}/odds?regions=eu,uk&oddsFormat=decimal&markets=totals&apiKey=${apiKey}`)
      ]);

      if(!r1)continue;
      if(!r1.ok){
        if(r1.status===401){S.status='❌ Invalid API key.';S.statusType='err';S.loading=false;render();return}
        if(r1.status===429){S.status='⏳ Rate limit — wait 1 min';S.statusType='err';S.loading=false;render();return}
        continue;
      }
      S.creditsUsed=parseInt(r1.headers.get('x-requests-used'))||0;
      S.creditsRemaining=parseInt(r1.headers.get('x-requests-remaining'))||0;
      const d1=await r1.json();

      let d2=[];
      if(r2&&r2.ok){d2=await r2.json();S.creditsUsed=parseInt(r2.headers.get('x-requests-used'))||S.creditsUsed;S.creditsRemaining=parseInt(r2.headers.get('x-requests-remaining'))||S.creditsRemaining;}

      S.progress=`Scanning ${sport.name}... (${si+1}/${SPORTS.length}) — ${d1.length} games`;render();

      // Build totals map — ONLY YOUR 3 BOOKMAKERS
      const tMap={};
      d2.forEach(ev=>{const t={};ev.bookmakers.forEach(bk=>{if(!MY_BOOKS.includes(bk.key))return;const mt=bk.markets.find(m=>m.key==='totals');if(!mt)return;mt.outcomes.forEach(o=>{if(!t[o.point])t[o.point]={};if(!t[o.point][bk.key])t[o.point][bk.key]={};t[o.point][bk.key][o.name.toLowerCase()]=o.price;});});tMap[ev.id]=t;});

      // Process h2h data — ONLY YOUR 3 BOOKMAKERS
      d1.forEach(ev=>{
        if(!ev.bookmakers||ev.bookmakers.length<2)return;
        const h2h={},totals=tMap[ev.id]||{};
        ev.bookmakers.forEach(bk=>{
          if(!MY_BOOKS.includes(bk.key))return;
          const mH=bk.markets.find(m=>m.key==='h2h');
          if(mH){
            const hO=mH.outcomes.find(o=>o.name===ev.home_team);
            const aO=mH.outcomes.find(o=>o.name===ev.away_team);
            const dO=mH.outcomes.find(o=>o.name==='Draw');
            if(hO&&aO&&dO)h2h[bk.key]={home:hO.price,draw:dO.price,away:aO.price};
          }
        });
        // Filter totals to only your 3 books too
        const filtTotals={};
        Object.entries(totals).forEach(([pt,bks])=>{const f={};Object.entries(bks).forEach(([bk,v])=>{if(MY_BOOKS.includes(bk))f[bk]=v;});if(Object.keys(f).length>=2)filtTotals[pt]=f;});

        const bkCount=Object.keys(h2h).length;

      });
      });
    }catch(e){console.error(e)}
  }
  S.matches=allM;S.isLive=true;S.loading=false;
  const ac=allM.reduce((s,m)=>s+m.arbs.length,0);
  const with2=allM.filter(m=>m.bkCount>=2).length;
  const with1=allM.filter(m=>m.bkCount===1).length;

  S.status=`✅ ${allM.length} matches • ${ac} arbs found • Credits: ${S.creditsUsed} used`;
  S.statusType='ok';S.progress='';
  localStorage.setItem('wizzy_key',apiKey);S.apiKey=apiKey;
  document.getElementById('scanText').textContent='LIVE';render();
}

// ═══════════ ARB FINDERS ═══════════
function find3Way(odds){
  const bks=Object.keys(odds);if(bks.length<2)return[];
  let bH={odd:0,bm:''},bD={odd:0,bm:''},bA={odd:0,bm:''};
  bks.forEach(bk=>{if(odds[bk].home>bH.odd)bH={odd:odds[bk].home,bm:bk};if(odds[bk].draw>bD.odd)bD={odd:odds[bk].draw,bm:bk};if(odds[bk].away>bA.odd)bA={odd:odds[bk].away,bm:bk}});
  const ip=1/bH.odd+1/bD.odd+1/bA.odd;
  if(ip<1)return[{type:'3way',typeName:'3-Way',outcomes:['home','draw','away'],outLabels:['Home Win','Draw','Away Win'],best:[bH,bD,bA],margin:+((1-ip)*100).toFixed(2)}];
  return[];
}
function findTotals(totals){
  const arbs=[];
  Object.entries(totals).forEach(([pt,bkData])=>{
    const bks=Object.keys(bkData);if(bks.length<2)return;
    let bO={odd:0,bm:''},bU={odd:0,bm:''};
    bks.forEach(bk=>{if(bkData[bk].over&&bkData[bk].over>bO.odd)bO={odd:bkData[bk].over,bm:bk};if(bkData[bk].under&&bkData[bk].under>bU.odd)bU={odd:bkData[bk].under,bm:bk}});
    if(bO.odd>0&&bU.odd>0){const ip=1/bO.odd+1/bU.odd;if(ip<1)arbs.push({type:'ou',typeName:'O/U '+pt,outcomes:['over','under'],outLabels:['Over '+pt+' Goals','Under '+pt+' Goals'],best:[bO,bU],margin:+((1-ip)*100).toFixed(2),point:pt})}
  });return arbs;
}
function findSpreads(sp,ht,at){
  const arbs=[];
  Object.entries(sp).forEach(([hc,bkData])=>{
    const bks=Object.keys(bkData).filter(bk=>bkData[bk].home&&bkData[bk].away);
    if(bks.length<2)return;
    let bH={odd:0,bm:''},bA={odd:0,bm:''};
    bks.forEach(bk=>{if(bkData[bk].home>bH.odd)bH={odd:bkData[bk].home,bm:bk};if(bkData[bk].away>bA.odd)bA={odd:bkData[bk].away,bm:bk}});
    if(bH.odd>0&&bA.odd>0){const ip=1/bH.odd+1/bA.odd;const h=parseFloat(hc);
      if(ip<1)arbs.push({type:'ah',typeName:'AH '+hc,outcomes:['home','away'],outLabels:[ht.split(' ').pop()+' ('+(h>=0?'+':'')+hc+')',at.split(' ').pop()+' ('+(h>0?'-':'+')+Math.abs(h)+')'],best:[bH,bA],margin:+((1-ip)*100).toFixed(2),handicap:hc})}
  });return arbs;
}

  S.isLive=false;S.matches=genDemo();S.status='📊 Demo mode — simulated odds';S.statusType='';

function sr(s){let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646}}
function genDemo(){
  const TM={"Premier League":[["Arsenal","ARS"],["Chelsea","CHE"],["Liverpool","LIV"],["Man City","MCI"],["Man United","MUN"],["Tottenham","TOT"]],"La Liga":[["Real Madrid","RMA"],["Barcelona","BAR"],["Atletico Madrid","ATM"],["Sevilla","SEV"]],"Serie A":[["AC Milan","MIL"],["Inter Milan","INT"],["Juventus","JUV"],["Napoli","NAP"]],"Bundesliga":[["Bayern Munich","BAY"],["Dortmund","BVB"],["RB Leipzig","RBL"],["Leverkusen","B04"]],"Ligue 1":[["PSG","PSG"],["Marseille","OM"],["Lyon","OL"],["Monaco","MON"]],"Champions League":[["Real Madrid","RMA"],["Man City","MCI"],["Bayern Munich","BAY"],["PSG","PSG"]]};
  const m=[];let id=1,sd=42;
  Object.entries(TM).forEach(([lg,teams])=>{
    for(let i=0;i<teams.length-1;i+=2){
      const r=sr(sd++);const b1=1.5+r()*3.5,bd=2.8+r()*1.5,b2=1.5+r()*3.5;
      const h2h={},totals={'2.5':{}},spreads={'-0.5':{}};
      MY_BOOKS.forEach(bk=>{const v=()=>(r()-.5)*.18;
        h2h[bk]={home:+(b1+v()).toFixed(2),draw:+(bd+v()).toFixed(2),away:+(b2+v()).toFixed(2)};
        totals['2.5'][bk]={over:+(1.7+r()*.5+v()).toFixed(2),under:+(1.8+r()*.5+v()).toFixed(2)};
        spreads['-0.5'][bk]={home:+(1.6+r()*.8+v()).toFixed(2),away:+(1.8+r()*.6+v()).toFixed(2)};
      });
      const d=new Date(2026,2,24+Math.floor(i/2),15+(i%4)*2,0);
      const arbs=[...find3Way(h2h),...findTotals(totals),...findSpreads(spreads,teams[i][0],teams[i+1][0])];
      m.push({id:'d-'+id++,league:lg,home:teams[i],away:teams[i+1],h2h,totals,spreads,arbs,kickoff:d});
    }
  });return m;
}

// ═══════════ HELPERS ═══════════
function getAll(){
  return S.matches.flatMap(m=>m.arbs.map(a=>({...a,match:m})))
    .filter(a=>a.margin>=S.minMargin)
    .filter(a=>S.league==='All'||a.match.league===S.league)
    .filter(a=>S.mktType==='all'||a.type===S.mktType)
    .sort((a,b)=>b.margin-a.margin).slice(0,100);
}
function getLeagues(){return[...new Set(S.matches.map(m=>m.league))]}
function cStakes(arb,bank){const tot=arb.best.reduce((s,b)=>s+1/b.odd,0);return arb.best.map((b,i)=>{const st=(bank*(1/b.odd))/tot;return{...b,stake:+st.toFixed(2),payout:+(st*b.odd).toFixed(2),label:arb.outLabels[i]}})}
function sig(m){if(m>=3)return{c:'var(--green)',l:'STRONG BUY',d:'#00E676',r:'High margin'};if(m>=1.5)return{c:'#76FF03',l:'BUY',d:'#76FF03',r:'Good margin'};if(m>=.8)return{c:'var(--gold)',l:'CAUTION',d:'#FFD740',r:'Check fees'};return{c:'var(--red)',l:'SKIP',d:'#FF5252',r:'Too thin'}}
function badge(k){const b=BOOK_INFO[k]||{name:k,color:'#556677'};return`<span class="bm" style="background:${b.color}">${b.name}</span>`}
function mclr(m){return m>=3?'var(--green)':m>=1.5?'#76FF03':m>=.8?'var(--gold)':'var(--red)'}
function pairDesc(arb){const names=arb.best.map(b=>(BOOK_INFO[b.bm]||{name:b.bm}).name);return names.join(' vs ');}

          if(arb.type==='ah'&&m.spreads[arb.handicap]){
            const d=m.spreads[arb.handicap];let bH=0,bA=0;MY_BOOKS.forEach(bk=>{if(d[bk]&&d[bk].home>bH)bH=d[bk].home;if(d[bk]&&d[bk].away>bA)bA=d[bk].away});
            return MY_BOOKS.filter(bk=>d[bk]).map(bk=>`<tr><td>${badge(bk)}</td><td class="${d[bk].home===bH?'best':''}">${d[bk].home||'-'}</td><td class="${d[bk].away===bA?'best':''}">${d[bk].away||'-'}</td></tr>`).join('');
          }
          return'';
        })()}</tbody></table></div>
      </div>`;
    }
  });

  h+=`</div><div class="footer">Wizzy Arb Engine v8.0 — All Sports + Auto-Save<br>Pinnacle • 1XBet • Marathon — Football, NBA, Tennis, NHL, MLB, MMA & more<br>${S.isLive?'Real odds from The Odds API':'Demo data'} • Powered by Claude AI</div>`;

  document.getElementById('app').innerHTML=h;
  document.getElementById('goBtn').onclick=()=>{const k=document.getElementById('apiKeyInput').value.trim();if(!k){S.status='👆 Paste API key first';S.statusType='err';render();return}fetchOdds(k)};
  document.getElementById('demoBtn').onclick=()=>loadDemo();
  document.getElementById('apiKeyInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('goBtn').click()};
  document.getElementById('toggleGuide').onclick=e=>{e.stopPropagation();S.guideOpen=!S.guideOpen;render()};
  const bi=document.getElementById('bi');if(bi)bi.oninput=e=>{S.bankroll=+e.target.value||0;localStorage.setItem('wizzy_bankroll',S.bankroll);render()};
  document.querySelectorAll('.fbtn[data-l]').forEach(b=>b.onclick=()=>{S.league=b.dataset.l;S.sel=null;render()});
  document.querySelectorAll('.fbtn[data-m]').forEach(b=>b.onclick=()=>{S.mktType=b.dataset.m;S.sel=null;render()});
  // Bankroll presets
  document.querySelectorAll('.fbtn[data-br]').forEach(b=>b.onclick=()=>{S.bankroll=+b.dataset.br;localStorage.setItem('wizzy_bankroll',S.bankroll);render()});
  const ms=document.getElementById('ms');if(ms)ms.oninput=e=>{S.minMargin=+e.target.value;S.sel=null;render()};
  document.querySelectorAll('.acard').forEach(c=>c.onclick=()=>{const k=c.dataset.k;S.sel=S.sel===k?null:k;render()});
}
loadDemo();
</script>
</body>
